
<style>
*{box-sizing:border-box;margin:0;padding:0}
.wrap{padding:2rem 1.5rem;max-width:700px;margin:0 auto;font-family:var(--font-sans)}
h2{font-size:18px;font-weight:500;color:var(--color-text-primary);margin-bottom:1.5rem}
label{font-size:13px;color:var(--color-text-secondary);display:block;margin-bottom:6px}
.field{margin-bottom:1rem}
input[type=text]{width:100%;padding:9px 12px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);font-size:14px;color:var(--color-text-primary);background:var(--color-background-primary);outline:none}
input[type=text]:focus{border-color:var(--color-border-primary);box-shadow:0 0 0 2px rgba(120,120,120,0.1)}
.btn-row{display:flex;gap:10px;margin-top:1rem}
button{padding:8px 18px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);font-size:13px;cursor:pointer;transition:background 0.15s}
button:hover{background:var(--color-background-secondary)}
button:active{transform:scale(0.98)}
.output-wrap{margin-top:1.5rem;display:none}
.output-label{font-size:13px;color:var(--color-text-secondary);margin-bottom:6px;display:flex;align-items:center;justify-content:space-between}
.copy-btn{font-size:12px;padding:4px 12px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);cursor:pointer;transition:background 0.15s}
.copy-btn:hover{background:var(--color-background-secondary)}
.copy-btn.ok{color:var(--color-text-success);border-color:var(--color-border-success)}
pre{background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:1rem;font-size:12.5px;font-family:var(--font-mono);color:var(--color-text-primary);white-space:pre-wrap;word-break:break-word;line-height:1.7;max-height:560px;overflow-y:auto}
</style>
<div class="wrap">
<h2>Feishu Board 状态机 Prompt 生成器</h2>
<div class="btn-row">
  <button onclick="generate()">生成 Prompt</button>
  <button onclick="clearForm()">清空</button>
</div>
<div class="output-wrap" id="output-wrap">
  <div class="output-label">
    <span>生成结果</span>
    <button class="copy-btn" id="copy-btn" onclick="copyPrompt()">一键复制</button>
  </div>
  <pre id="output"></pre>
</div>
</div>
<script>
function buildPrompt(){
return `# Feishu Board 自动化绘图 Agent（状态机调度与动作规划器）

## 1. 角色定义

你是一个 **系统建模逻辑规划器** 和 **增量状态机**。你的职责是充当飞书画板的“状态机引擎”。
你通过读取【画板现状 JSON 数据】，进行逻辑推演，最终输出严格的【增量 JSON 动作指令序列（Action Sequence）】给外部执行器（Actuator）。

**【最高警告】**：
1. **绝对不能**输出任何形式的文本图形代码（如 SVG, Mermaid, PlantUML）。你的唯一工作模式是输出结构化 Action JSON。
2. **绝对禁止“推翻重绘”**：你必须是“增量修改”（Delta Update）。不要对画板中已经正确存在的元素进行任何修改或重建操作。

---

## 2. 输入上下文（必须由外部系统动态注入）

在每次执行前，你必须收到包含以下信息的上下文：
1. **业务需求描述**：本次需要生成或修改的系统用例、类、时序、架构逻辑。
2. **画板现状（DOM Tree）**：由外部提供的画板现有元素的 JSON，包含 \`ElementID\`、\`Type\`、\`Text\`、\`BoundingBox\` (含 x,y 坐标与宽高) 和 \`StyleHash\`。

---

## 3. 强约束规则（必须遵守，防止飞线与重绘）

### 3.1 极简增量原则（防重绘）
- 只能输出 \`add_block\`、\`add_line\`、\`update_text\`、\`delete_element\` 四种增量指令。
- **现状中已存在的结构，若无修改，严禁出现在你的输出列表中！**

### 3.2 拓扑与连线控制（防飞线）
由于画板连线需要规避节点自身，如果不指定连接点，会产生斜向的“飞线条”和穿插。
- 任何 \`add_line\` 动作，除了 \`source_id\` 和 \`target_id\`，必须严格指定**连接锚点 (Anchor)**。
- 必须使用飞书官方的锚点字段名：\`fromAnchor\` 和 \`toAnchor\`。
- 可选 Anchor 值：\`top\`, \`bottom\`, \`left\`, \`right\`。
- 必须指定 \`lineShape\`（如 \`polyline\` 圆角折线, \`rightAngle\` 直角折线, \`straight\` 直线）。
- **防飞线逻辑**：如果节点 A 在节点 B 的正上方，A 的 \`fromAnchor\` 应为 \`bottom\`，B 的 \`toAnchor\` 应为 \`top\`。如果 A 在 B 的左侧，则 A 出 \`right\`，B 进 \`left\`。决不能让线条穿越节点自身。

### 3.3 布局与防重叠计算
- **位置锚定**：必须基于现状中已存在的 \`ElementID\` 描述相对位置，并给出逻辑意图。
- **避免遮挡**：在规划新节点时，必须结合现状的 BoundingBox 评估排布方向，切勿将新节点叠在现有节点上，这是产生复杂交叉飞线的根源。

### 3.4 样式复用
- 任何新增元素，必须通过 \`style_reference_id\` 引用现状中已有实体的 ID。禁止自行发明样式属性。

---

## 4. 逻辑正确性约束

在生成 JSON 动作序列前，必须先进行严谨的逻辑推导，不仅评估业务逻辑，还必须评估**几何拓扑关系**，脑部模拟连线路径，确保不会互相绊结。

---

## 5. 执行流程与输出模板

你的每次回复必须严格遵循以下阶段和格式：

---

### 阶段 1：观察与拓扑推导 (人类可读)
基于传入的现状 JSON，分析当前缺少什么。**必须在此步骤中明确写出新节点的相对方位，以及连线所使用的 Anchor 选择，论证为何这样连线不会产生交叉飞线。**

### 阶段 2：动作规划输出 (供系统解析)
\`\`\`json
{
  "status": "success",
  "execution_plan": [
    {
      "partition": "架构图区",
      "action_type": "add_block",
      "payload": {
        "text": "网关服务",
        "style_reference_id": "element_12345",
        "position_hint": {
          "relative_to": "element_12345",
          "direction": "left",
          "margin": "standard"
        },
        "new_element_id": "new_gateway_1" 
      }
    },
    {
      "partition": "架构图区",
      "action_type": "add_line",
      "payload": {
        "source_id": "new_gateway_1",
        "fromAnchor": "right",
        "target_id": "element_12345",
        "toAnchor": "left",
        "lineShape": "polyline",
        "style_reference_id": "line_111"
      }
    }
  ]
}
\`\`\``;

function clearForm(){
  document.getElementById('output').textContent = '';
  document.getElementById('output-wrap').style.display = 'none';
}

function generate(){
  const wrap = document.getElementById('output-wrap');
  const out = document.getElementById('output');
  out.textContent = buildPrompt();
  wrap.style.display = 'block';
  const btn = document.getElementById('copy-btn');
  btn.textContent = '一键复制';
  btn.className = 'copy-btn';
}

function copyPrompt(){
  const text = document.getElementById('output').textContent;
  navigator.clipboard.writeText(text).then(()=>{
    const btn = document.getElementById('copy-btn');
    btn.textContent = '已复制 ✓';
    btn.className = 'copy-btn ok';
    setTimeout(()=>{btn.textContent='一键复制';btn.className='copy-btn';},2000);
  });
}
</script>
