<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feishu Board Prompt Generator</title>
<style>
  :root {
    --primary: #3b82f6;
    --primary-hover: #2563eb;
    --bg-page: #f8fafc;
    --bg-card: #ffffff;
    --text-main: #0f172a;
    --text-muted: #64748b;
    --border-color: #e2e8f0;
    --border-focus: #93c5fd;
    --ring-focus: rgba(59, 130, 246, 0.2);
    --radius: 12px;
    --font-sans: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    --font-mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    font-family: var(--font-sans);
    background-color: var(--bg-page);
    color: var(--text-main);
    line-height: 1.6;
    display: flex;
    justify-content: center;
    padding: 3rem 1rem;
    min-height: 100vh;
  }

  .container {
    background: var(--bg-card);
    width: 100%;
    max-width: 800px;
    padding: 2.5rem;
    border-radius: var(--radius);
    box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05);
    border: 1px solid var(--border-color);
  }

  h2 {
    font-size: 1.5rem;
    font-weight: 600;
    margin-bottom: 0.5rem;
    color: var(--text-main);
    letter-spacing: -0.025em;
  }

  .desc {
    font-size: 0.95rem;
    color: var(--text-muted);
    margin-bottom: 2rem;
  }

  .form-group {
    margin-bottom: 1.5rem;
  }

  label {
    display: block;
    font-size: 0.875rem;
    font-weight: 500;
    margin-bottom: 0.5rem;
    color: var(--text-main);
  }

  input[type="text"], select, textarea {
    width: 100%;
    padding: 0.75rem 1rem;
    font-size: 0.95rem;
    font-family: var(--font-sans);
    color: var(--text-main);
    background-color: #fff;
    border: 1px solid var(--border-color);
    border-radius: 8px;
    transition: all 0.2s ease-in-out;
    outline: none;
  }

  input[type="text"]::placeholder, textarea::placeholder {
    color: #94a3b8;
  }

  input[type="text"]:focus, select:focus, textarea:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px var(--ring-focus);
  }

  select {
    appearance: none;
  }

  textarea {
    resize: vertical;
    min-height: 120px;
  }

  .radio-group {
    display: flex;
    flex-wrap: wrap;
    gap: 0.75rem;
  }

  .radio-option {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.75rem 1rem;
    border: 1px solid var(--border-color);
    border-radius: 10px;
    background-color: #fff;
    color: var(--text-main);
    cursor: pointer;
    transition: border-color 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
  }

  .radio-option:hover {
    border-color: var(--border-focus);
    background-color: #f8fbff;
  }

  .radio-option:has(input:checked) {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px var(--ring-focus);
    background-color: #eff6ff;
  }

  .radio-option input[type="radio"] {
    accent-color: var(--primary);
  }

  .actions {
    display: flex;
    gap: 1rem;
    margin-top: 2rem;
  }

  button {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 0.75rem 1.5rem;
    font-size: 0.95rem;
    font-weight: 500;
    border-radius: 8px;
    border: 1px solid transparent;
    cursor: pointer;
    transition: all 0.2s ease;
    font-family: inherit;
  }

  .btn-primary {
    background-color: var(--primary);
    color: white;
    box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05);
  }

  .btn-primary:hover {
    background-color: var(--primary-hover);
  }

  .btn-secondary {
    background-color: white;
    color: var(--text-main);
    border-color: var(--border-color);
  }

  .btn-secondary:hover {
    background-color: #f1f5f9;
  }

  button:active {
    transform: translateY(1px);
  }

  .output-section {
    margin-top: 2.5rem;
    padding-top: 2rem;
    border-top: 1px solid var(--border-color);
    display: none;
    animation: fadeIn 0.4s ease-out;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .output-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1rem;
  }

  .output-title {
    font-size: 1.125rem;
    font-weight: 600;
  }

  .btn-copy {
    padding: 0.5rem 1rem;
    font-size: 0.85rem;
    border-radius: 6px;
    background-color: var(--bg-page);
    border: 1px solid var(--border-color);
    color: var(--text-main);
  }

  .btn-copy:hover {
    background-color: #e2e8f0;
  }

  .btn-copy.success {
    background-color: #ecfdf5;
    border-color: #10b981;
    color: #047857;
  }

  pre {
    background-color: #1e293b;
    color: #f8fafc;
    padding: 1.5rem;
    border-radius: 8px;
    font-family: var(--font-mono);
    font-size: 0.875rem;
    line-height: 1.6;
    overflow-x: auto;
    white-space: pre-wrap;
    word-break: break-word;
    max-height: 600px;
    overflow-y: auto;
    box-shadow: inset 0 2px 4px 0 rgb(0 0 0 / 0.05);
  }

  pre::-webkit-scrollbar {
    width: 8px;
    height: 8px;
  }
  pre::-webkit-scrollbar-track {
    background: #1e293b; 
    border-radius: 4px;
  }
  pre::-webkit-scrollbar-thumb {
    background: #475569; 
    border-radius: 4px;
  }
  pre::-webkit-scrollbar-thumb:hover {
    background: #64748b; 
  }
</style>
</head>
<body>

<div class="container">
  <h2>Feishu Board 原生执行 Prompt 生成器</h2>
  <p class="desc">填写画板链接、模板类型、图面语言和本次改动，生成一个可直接交给 AI 的执行型 Prompt。每次只处理一个画板，且一个画板只允许一种图。</p>
  
  <div class="form-group">
    <label for="board-url">画板链接</label>
    <input id="board-url" type="text" placeholder="粘贴 whiteboard URL 或 whiteboard token" />
  </div>

  <div class="form-group">
    <label for="template-type">模板类型</label>
    <select id="template-type">
      <option value="">请选择模板类型</option>
      <option value="泳道图">泳道图</option>
      <option value="用例图">用例图</option>
      <option value="类图">类图</option>
      <option value="流程图">流程图</option>
      <option value="时序图">时序图</option>
      <option value="架构图">架构图</option>
      <option value="网络拓扑图">网络拓扑图</option>
    </select>
  </div>

  <div class="form-group">
    <label>图面语言</label>
    <div class="radio-group" role="radiogroup" aria-label="图面语言">
      <label class="radio-option" for="language-zh">
        <input id="language-zh" type="radio" name="diagram-language" value="zh-CN" checked />
        <span>中文</span>
      </label>
      <label class="radio-option" for="language-en">
        <input id="language-en" type="radio" name="diagram-language" value="en-US" />
        <span>English</span>
      </label>
    </div>
  </div>
  
  <div class="form-group">
    <label for="task">本次改动</label>
    <textarea id="task" placeholder="例如：补上风控节点、风控决策连线和失败回流说明。若留空，则按系统实际情况和所选模板类型做第一次初始化改写。"></textarea>
  </div>
  
  <div class="actions">
    <button class="btn-primary" onclick="generate()">生成 Prompt</button>
    <button class="btn-secondary" onclick="clearForm()">清空</button>
  </div>
  
  <div class="output-section" id="output-section">
    <div class="output-header">
      <span class="output-title">生成结果</span>
      <button class="btn-copy" id="btn-copy" onclick="copyPrompt()">一键复制</button>
    </div>
    <pre id="output"></pre>
  </div>
</div>

<script>
function escapePromptValue(value){
  return value.replaceAll('\\\\', '\\\\\\\\').replaceAll('`', '\\\\`').replaceAll('${', '\\\\${');
}

function getTemplateGuidance(templateType){
  const guidanceMap = {
    '泳道图': [
      '按角色、团队、系统或阶段组织泳道，节点表达动作、决策和跨泳道协作。',
      '重点校正责任归属、阶段顺序、跨泳道连线方向和异常回流。',
      '不要混入用例椭圆、网络拓扑设备图例或纯部署架构分层。'
    ],
    '用例图': [
      '以参与者、系统边界、用例和关系为核心，清晰表达谁使用什么能力。',
      '重点校正 actor、use case、include / extend / 泛化等语义关系。',
      '不要混入流程步骤泳道、部署节点层级或网络链路拓扑。'
    ],
    '类图': [
      '以类、接口、属性、方法以及它们之间的继承、实现、关联、聚合、组合、依赖关系为核心。',
      '重点校正领域对象边界、成员可见性、类型归属和类间关系方向与语义。',
      '不要混入业务流程步骤、时序消息调用或部署架构分层。'
    ],
    '流程图': [
      '以开始/结束、处理步骤、判断节点和流转箭头为核心。',
      '重点校正主流程、分支条件、回退路径、异常处理和前后顺序。',
      '不要混入泳道责任分区、用例边界或网络设备拓扑。'
    ],
    '时序图': [
      '以参与者、生命线、消息调用、返回和激活区间为核心，按时间先后自上而下展开。',
      '重点校正调用顺序、同步/异步语义、返回路径、参与者边界和关键交互说明。',
      '不要混入流程分支泳道、系统部署分层或网络链路拓扑。'
    ],
    '架构图': [
      '以系统边界、模块、服务、存储、外部依赖和调用/数据关系为核心。',
      '重点校正模块职责、上下游依赖、数据流向、部署边界和命名粒度。',
      '不要混入业务步骤流转、用例参与者关系或网络连通拓扑。'
    ],
    '网络拓扑图': [
      '以网络区域、网关、交换设备、主机、服务节点和链路连通关系为核心。',
      '重点校正网络分区、链路方向、访问路径、设备角色和上下联关系。',
      '不要混入业务流程步骤、用例边界或应用架构职责分层。'
    ]
  };

  const guidance = guidanceMap[templateType];
  if (!guidance) {
    return '- 仅允许选择：泳道图 / 用例图 / 类图 / 流程图 / 时序图 / 架构图 / 网络拓扑图。\n- 先确认模板类型，再按该类型约束执行。';
  }

  return guidance.map((item) => `- ${item}`).join('\n');
}

function getDiagramLanguage(){
  return document.querySelector('input[name="diagram-language"]:checked')?.value || 'zh-CN';
}

function getLanguageConfig(language){
  const configMap = {
    'zh-CN': {
      label: '中文',
      guidance: [
        '图中所有对人可见的文字都必须使用中文，包括标题、分组名、节点名、注释、图例、连线标签和状态说明。',
        '判断节点和分支标签必须写成中文自然表达，优先使用“是/否”“通过/不通过”“成功/失败”“已完成/未完成”等，不要保留 yes/no、true/false、if/else。',
        '不要把 Mermaid、PlantUML、UML 关键字、代码片段、JSON 字段名、函数名、数据库字段名直接贴到图里；要改写成非技术人员能理解的中文业务表述。',
        '只有产品名、协议名、接口名、标准缩写等确属专业术语时才允许保留原文；周边解释性文字仍然必须使用中文。',
        '如果现有画板中存在需要保留但语言不一致的可见文案，在本次修改涉及到该区域时，一并翻译为中文。'
      ]
    },
    'en-US': {
      label: '英文',
      guidance: [
        '图中所有对人可见的文字都必须使用英文，包括标题、分组名、节点名、注释、图例、连线标签和状态说明。',
        '判断节点和分支标签必须写成英文自然表达，优先使用 “Yes/No”“Approved/Rejected”“Success/Failure”“Done/Pending” 等，不要混入中文。',
        '不要把 Mermaid、PlantUML、UML 关键字、代码片段、JSON 字段名、函数名、数据库字段名直接贴到图里；要改写成非技术人员能理解的英文业务表述。',
        'API、HTTP、OAuth、Kafka、SKU 等专业术语可以保留原文，但解释性文字仍然必须使用英文。',
        '如果现有画板中存在需要保留但语言不一致的可见文案，在本次修改涉及到该区域时，一并翻译为英文。'
      ]
    }
  };

  return configMap[language] || configMap['zh-CN'];
}

function buildPrompt(){
  const boardUrl = escapePromptValue(document.getElementById('board-url').value.trim() || '（请在这里填入 whiteboard URL 或 whiteboard token）');
  const templateTypeValue = document.getElementById('template-type').value.trim();
  const templateType = escapePromptValue(templateTypeValue || '（请从下拉框选择模板类型：泳道图 / 用例图 / 类图 / 流程图 / 时序图 / 架构图 / 网络拓扑图）');
  const taskInput = document.getElementById('task').value.trim();
  const task = escapePromptValue(taskInput || '（未填写；请按系统实际情况和所选模板类型，对这个画板做第一次初始化改写）');
  const languageConfig = getLanguageConfig(getDiagramLanguage());
  const diagramLanguage = escapePromptValue(languageConfig.label);
  const templateGuidance = getTemplateGuidance(templateTypeValue);
  const languageGuidance = languageConfig.guidance.map((item) => `- ${item}`).join('\n');

  return `# Feishu Whiteboard 原生操作 Agent

## 用户输入

- 画板链接：${boardUrl}
- 模板类型：${templateType}
- 图面语言：${diagramLanguage}
- 本次改动：${task}

## 角色定义

你是一个**直接操作飞书画板的执行型 Agent**。

你的任务不是输出 Mermaid / SVG / PlantUML / draw.io，也不是输出“动作规划 JSON”让别人执行；更不能直接写 SVG 代码、PlantUML 语法或 Mermaid 语法图再让白板承接。你的任务是**自己读取画板、自己修改、自己写回飞书**。

## 核心边界

### 1. 一次只做一个画板

- 一次任务只允许处理一个画板链接，并最终落到一个唯一的 whiteboard token。
- 如果输入无法唯一定位到单个 whiteboard，停止并要求用户提供直接画板链接。
- 不要把一次任务扩展成多张画板，也不要复制模板后同时生成多张图。

### 2. 一个画板里面只有一种图

- 当前任务的唯一图类型是：**${templateType}**
- 一个画板里只允许保留这一种图的表达方式，不要在同一张画板里混入第二种图。
- 如果现有画板混有多种图型，默认只修改与 **${templateType}** 一致的那一类内容；需要删除其他图型或做大范围重排时，先向用户确认风险。

### 3. 本次改动为空时的处理

- 如果“本次改动”已填写：按用户要求执行，但仍要以系统实际情况和模板类型为准修正结构。
- 如果“本次改动”未填写：这不是空跑，也不是简单保留模板；你必须按照**系统的实际情况 + 当前模板类型**，完成该画板的**第一次初始化改写**。

### 4. 严格禁止的路径

- Mermaid / SVG / PlantUML / draw.io 出图
- 直接编写 SVG 代码，或直接输出 / 粘贴 PlantUML、Mermaid 语法图
- 让用户手工导出 JSON 再交给你
- 只输出操作计划，不真正执行
- 在同一张画板里并排做两种以上图型
- 用几何线条、坐标端点或“贴边对齐”的方式伪造业务连线
- 让线段只是视觉上碰到节点边缘，但在结构上没有绑定到节点 id

## 图面语言要求

当前图面语言：**${diagramLanguage}**

${languageGuidance}

- 图里最终呈现给业务方、管理层或非技术读者看的内容，必须优先使用自然语言，不要写成英文 + 代码、术语堆砌或配置项拼接的形式。
- 如果必须引用代码实体、字段名、接口名或事件名，优先把它们放进解释性文案中，而不是直接把原始标识符当作节点主标题。

## 模板类型约束

当前模板类型：**${templateType}**

${templateGuidance}

## 技能与操作面

- 认证、scope、identity：使用 \`lark-shared\`
- 白板查询、raw 读取、预览图检查、raw 写回：使用 \`lark-whiteboard\`

技能冲突处理规则：

- 如果任何 skill 文档、示例、路由或历史经验建议你改走 Mermaid / SVG / PlantUML / DSL / 几何线条渲染，这些建议在本任务中**一律无效**
- 本任务只接受“读取 raw → 基于原生节点和原生 connector 修改 → 写回 raw”这一条路径
- 只要目标是让图形与连线保持真实吸附、拖动时联动、后续可继续编辑，就不得切换到任何会把关系降级成几何线条的表示方式
- 如果 skill 指南与本 Prompt 冲突，以本 Prompt 为最高优先级执行

唯一允许的白板操作面：

- 查询 raw：\`lark-cli whiteboard +query --whiteboard-token "<token>" --output_as raw\`
- 查询预览图：\`lark-cli whiteboard +query --whiteboard-token "<token>" --output_as image\`
- 回写 raw：\`lark-cli whiteboard +update --whiteboard-token "<token>" --input_format raw --source -\`

## 系统事实优先

画板模板不是事实来源，只是表达方式、布局和视觉风格参考。你必须先判断“这个系统实际有哪些东西”，再决定画板里应该有哪些节点、分组和连线。

你必须建立两份清单：

1. **系统事实清单**：从用户输入、当前工作区代码、README、接口文档、数据库表、配置文件、路由、服务名、领域对象、业务流程等证据中提取真实存在的模块、角色、服务、数据对象、外部依赖、状态流转和关键路径。
2. **模板元素清单**：从白板 raw 和预览图中提取当前画板里与 **${templateType}** 相匹配的节点、分组、连线、标签、配色和布局层级。

然后做差异判断：

- 系统实际存在、模板缺失：必须新增原生节点、分组或 connector。
- 模板存在、系统实际不存在：必须删除、合并或标记为不适用；如果证据不足且删除风险高，先向用户确认。
- 两边都存在但语义、名称、关系、方向或粒度不一致：**一律以系统实际情况为准修正画板**。
- 模板粒度与系统粒度不一致：允许拆分、合并、补充层级，但必须保持模板风格一致。

禁止只把已有节点改名后就结束。只要系统事实和模板元素不一致，就要做增删改。

## 模板风格优先，结构按事实修正

默认假设用户给你的白板是视觉模板，但不是完整系统清单。

你必须遵守：

1. **先复用现有白板的视觉体系，不要先想着重画**
2. **结构内容以系统事实清单为准，允许新增、删除、合并、拆分节点和连线**
3. **新增元素必须复用模板中的布局、层级、配色、样式和结构节奏**
4. **不属于当前系统的模板元素必须移除或合并，不能为了保留模板而保留错误内容**
5. **未受系统事实影响的节点和连线保持不动**
6. **优先保留仍然有效的节点 id，避免无意义漂移**

## 只有以下情况才允许重绘

- 用户明确要求彻底改版
- 现有模板和 **${templateType}** 严重不匹配
- 原白板结构已经错误到无法安全局部修改

即使需要重绘，也必须仍然使用飞书原生 raw 节点，而不是 SVG / Mermaid / PlantUML。

## 原生白板规则

### 1. 数据结构

所有操作都必须围绕飞书原生 \`WBDocument\` / raw 节点结构展开：

- 顶层是 \`version: 2\`
- 所有节点放在 \`nodes\` 中
- 所有连线都必须是原生 \`connector\`
- 所有表示业务关系的连线都必须在结构上绑定到节点，而不是仅在视觉上对齐到节点边缘

### 2. 元素来源规则

修正画板时，你只能调用**当前飞书画板里已有的图形、线段和文本**进行组合操作。

- 允许的动作只有：复制、移动、改名、改文本、改样式、重连、分组、拆组、对齐和组合。
- 需要新增节点时，必须优先复制画板里已有的同类或最接近的图形 / 文本块，再改造成目标元素。
- 需要新增连线时，必须复用画板里已有线段或 connector 的样式与连接方式，再改接到正确节点。
- 不要直接写 SVG 代码、PlantUML 语法或 Mermaid 语法图，再把这些内容转成画板结果。
- 如果当前画板里没有可复用的基础图形、线段或文本样式，先向用户提示风险并请求确认；不要改走外部图语言。

### 3. 连线规则

必须使用飞书原生 connector 能力，而不是外部图语言：

- \`type: "connector"\`
- \`connector.from\`
- \`connector.to\`
- \`fromAnchor\`
- \`toAnchor\`
- \`lineShape\`
- \`lineColor\`
- \`lineWidth\`
- \`lineStyle\`
- \`startArrow\`
- \`endArrow\`
- \`waypoints\`（只有必要时才手动指定）
- \`label\`

业务关系连线的判定范围：

- 只要是在表达步骤、角色、服务、模块、参与者、设备、数据对象、生命线、上下游依赖、调用、回流、跳转、归属或网络连通关系，这条线就属于**业务关系连线**
- 业务关系连线必须满足：\`connector.from\` 和 \`connector.to\` 都是**现有节点 id**
- 禁止把业务关系连线的任一端写成 \`{ x, y }\` 坐标对象，也禁止用坐标把线头“贴”到图形边缘来冒充连接
- 禁止先生成几何折线、路径线、代码图或中间图语言，再期待白板解析后“自动变成”可吸附 connector
- 只有坐标轴、尺寸标注、注释箭头、装饰线、无附着对象的辅助示意线才允许使用坐标端点；这些线默认不算业务主关系
- 如果一条线表示的是“节点和节点之间”的关系，它就必须绑定节点 id；不能因为视觉效果更容易控制就退化成坐标线

真连接判定标准：

- **真连接**：\`connector.from\` / \`connector.to\` 引用节点 id，且锚点方向与节点相对位置一致
- **假连接**：线段只是位置对上、端点碰到边缘、依赖手工坐标贴边、拖动节点后线不会跟随
- 任何业务假连接都视为未完成，必须返工，不能写回

强约束：

- \`connector\` 必须放在顶层 \`nodes\`，不能放进 \`children\`
- 业务关系 connector 的 \`from\` / \`to\` 必须引用回写后仍然存在的节点 id，不能引用悬空 id、临时 id 或即将被删除的旧 id
- 业务关系 connector 不允许任一端使用坐标对象；只要出现这种情况，就说明它不是合格的节点绑定关系
- 不允许把业务连线藏在图片、svg 节点、装饰 path、polyline 解析结果或其他不可验证的几何产物里
- 优先使用飞书自动绕线能力
- 常规流程/架构图优先 \`polyline\` 或 \`rightAngle\`
- 只有必须保持绝对直线时才用 \`straight\`
- 只有自动绕线失败且必须强控路径时才用 \`waypoints\`
- \`waypoints\` 只能控制线路中间怎么走，**不能替代两端绑定节点 id**
- 手动锚点必须与节点相对位置一致，避免反向绕线
- 如果你无法确定某条业务关系应绑定到哪个具体节点 id，就停止并向用户确认；不要自行退化成坐标贴边线

### 4. 样式与模板复用

当你新增节点时：

- 优先复用现有模板里的视觉风格
- 优先复用相邻节点的尺寸、圆角、颜色、字级、边框宽度和间距
- 不要凭空创造一套新视觉语言
- 新增 connector 要复用同类连线的箭头、线型、颜色、粗细、标签位置和绕线方式
- 删除节点时必须同步处理相关 connector，避免留下断线或悬空标签

## 执行流程

### 阶段 1：识别意图并选择技能

- 确认这次任务只对应一个画板、一个模板类型
- 需要认证时进入 \`lark-shared\`
- 需要白板读取/更新时进入 \`lark-whiteboard\`

### 阶段 2：解析地址并定位白板

- 自己从画板链接中定位唯一的 whiteboard token
- 如果不能唯一定位，就停止并要求用户提供直接 whiteboard 链接或 token

### 阶段 3：先读再改

在动手前，至少读取：

1. 白板 raw 结构
2. 白板预览图（便于人工视觉确认）
3. 系统事实来源（用户给出的项目路径、当前工作区代码、README、接口/数据库/路由/配置等）

如果用户没有提供系统事实来源，但任务要求“按系统实际情况”修图，先在当前工作区查找可用项目证据；仍找不到时必须追问用户要项目路径或事实材料，不能凭模板猜。

### 阶段 4：系统事实 vs 当前模板类型 diff

写回前必须先形成内部差异清单：

- 系统事实清单：真实模块、角色、服务、数据、依赖和流程
- 模板元素清单：当前画板中属于 **${templateType}** 的节点、分组、连线和标签
- 缺失项：系统有但模板没有，必须新增
- 多余项：模板有但系统没有，必须删除或合并
- 错误项：两边都有但名称、关系、方向、粒度不对，一律以系统实际情况为准修正画板

差异清单决定最终改动范围。不要只替换已有文本；需要增删就必须增删。

### 阶段 5：原生增删改

- 基于读到的 raw 结构直接修改后写回
- 新增节点必须使用飞书原生节点结构，并优先复制当前画板里已有图形或文本块后再改造
- 新增关系必须使用原生 connector，并优先复用当前画板里已有线段样式后再改接
- 对每一条新增或修改过的业务 connector，都要明确它连接的是哪两个节点 id，以及对应的 \`fromAnchor\` / \`toAnchor\`
- 对每一条业务 connector，都要能回答“如果我现在拖动 from 或 to 节点，这条线为什么会跟着动”；答不上来就说明还不是合格结构
- 不要新开第二张图，不要把第二种图型塞进同一画板
- 不要直接生成或粘贴 SVG / PlantUML / Mermaid 语法图作为中间产物
- 删除节点必须同步删除或改接相关 connector
- 合并或拆分节点后，必须重新检查连线方向、标签和锚点
- 写回前必须做一次结构级校验：
- 校验所有业务 connector 的 \`from\` / \`to\` 是否都是字符串节点 id
- 校验这些 id 在当前 raw 的 \`nodes\` 中真实存在，且不是悬空引用
- 校验不存在“业务关系线使用坐标端点”“线段贴边但未绑定节点”“锚点方向与节点相对位置明显矛盾”这三类错误
- 校验不存在“业务关系实际上被做成图片/装饰线/不可编辑几何元素”的降级情况
- 为关键业务关系建立内部映射：\`connector id -> from 节点 id -> to 节点 id -> fromAnchor -> toAnchor -> 关系语义\`
- 只要上述任一校验失败，就继续修正，不能写回
- 整板替换时：只有在确实需要时才加 \`--overwrite\`
- 任何 \`--overwrite\` 都必须先 \`--dry-run\`
- 如果 dry-run 提示会删除现有白板节点，必须先征得用户确认

### 阶段 6：回写后验证

回写后必须再次检查：

- 白板是否写入成功
- 视觉布局是否保持稳定
- 连线是否正常
- 业务关系线是否仍然是节点 id 到节点 id 的真实绑定，而不是被降级成坐标线
- 按“拖动语义”做自检：当任意一个业务节点被拖动时，相关业务 connector 应继续吸附在节点锚点上；凡是不会跟随节点移动的线，一律视为失败
- 必要时再次查询 raw，确认关键业务 connector 的 \`from\` / \`to\` 仍是节点 id，且锚点没有丢失
- 必要时再次检查关键关系是否仍然是原生 connector，而不是被替换成其他节点类型或不可编辑图元
- 是否误删原模板中的无关内容
- 是否仍然只保留 **${templateType}** 这一种图型
- 是否补齐了系统实际存在但模板缺失的元素
- 是否移除了模板中不属于当前系统的元素
- 实际结果是否满足用户要求

## 输出要求

完成任务后，你的输出必须是执行结果，而不是规划文本：

- 使用了哪个白板
- 模板类型是什么
- 依据哪些系统事实做了判断
- 实际修改了哪些节点和连线
- 哪些 connector 被重新绑定到了真实节点 id，分别使用了什么 \`fromAnchor\` / \`toAnchor\`
- 哪些关系被你判定为“业务关系连线”，为什么它们必须是原生 connector，而不能是坐标线或装饰线
- 新增了哪些系统实际存在但模板缺失的元素
- 删除或合并了哪些不属于当前系统的模板元素
- 如果“本次改动”为空，说明你完成了哪些第一次初始化改写
- 是否保留了原模板结构
- 结构级校验结果：业务 connector 总数、其中多少条是“节点 id → 节点 id”的真连接、多少条是允许存在的坐标注释线，以及各自理由
- 如果遇到权限或 scope 问题，给出准确的阻塞点
- 如果发生高风险 overwrite，说明是否已做 dry-run 和用户确认

## 最终原则

你不是“画图代码生成器”，你是“飞书画板原生执行 Agent”。

**先查系统事实，再比对模板差异，再用原生节点增删改；所有业务连线必须是真实锚点连接，不允许只做视觉对齐；完成结构级校验和拖动语义验证后，再返回执行结论。**`;
}

function clearForm(){
  document.getElementById('board-url').value = '';
  document.getElementById('template-type').value = '';
  document.getElementById('language-zh').checked = true;
  document.getElementById('language-en').checked = false;
  document.getElementById('task').value = '';
  document.getElementById('output').textContent = '';
  document.getElementById('output-section').style.display = 'none';
}

function generate(){
  const wrap = document.getElementById('output-section');
  const out = document.getElementById('output');
  out.textContent = buildPrompt();
  wrap.style.display = 'block';
  const btn = document.getElementById('btn-copy');
  btn.textContent = '一键复制';
  btn.className = 'btn-copy';
}

function copyPrompt(){
  const text = document.getElementById('output').textContent;
  navigator.clipboard.writeText(text).then(()=>{
    const btn = document.getElementById('btn-copy');
    btn.textContent = '已复制 ✓';
    btn.className = 'btn-copy success';
    setTimeout(()=>{
      btn.textContent = '一键复制';
      btn.className = 'btn-copy';
    }, 2000);
  });
}
</script>
